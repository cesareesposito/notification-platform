name: notification-platform

services:
  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    restart: unless-stopped
    image: postgres:17-alpine
    container_name: postgres
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: secret
    volumes:
      - ./data/postgres-data:/var/lib/postgresql/data
    networks:
      - notification_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notifications"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Message broker ────────────────────────────────────────────────────────
  rabbitmq:
    restart: unless-stopped
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq
    # ports:
    #   - "5672:5672"    # AMQP
    #   - "15672:15672"  # Management UI (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./data/rabbitmq-data:/var/lib/rabbitmq
    networks:
      - notification_internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Notification API ──────────────────────────────────────────────────────
  notification-api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/Notification.Api.Dockerfile
    container_name: notification-api
    ports:
      - "8891:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__NotificationDb: "Host=postgres;Port=5432;Database=notifications;Username=notification;Password=secret"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      Templates__FileSystem__BasePath: /app/templates
      # JWT secret for the admin UI — change this in production!
      JwtAuth__Secret: ${NOTIFICATION_JWT_SECRET:-CHANGE_ME_IN_PRODUCTION_USE_32_CHARS_MIN}
      JwtAuth__Issuer: notification-platform
      JwtAuth__ExpiryAdminHours: "8"
      JwtAuth__ExpiryClientHours: "1"
      # Default password for the seeded admin user — change after first login
      AdminAuth__DefaultPassword: ${NOTIFICATION_ADMIN_PASSWORD:-changeme}
      # Add per-tenant API keys via env or secrets (backward compat)
      # ApiAuth__Keys__0: your-api-key-here
    volumes:
      - ./templates:/app/templates:ro
      - ./data/data-protection-keys:/keys
    networks:
      - notification_internal
      - platform_integration
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Notification Worker ───────────────────────────────────────────────────
  notification-worker:
    build:
      context: .
      dockerfile: docker/Notification.Worker.Dockerfile
    container_name: notification-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__NotificationDb: "Host=postgres;Port=5432;Database=notifications;Username=notification;Password=secret"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      Providers__SendGrid__ApiKey: ${SENDGRID_API_KEY:-}
      Providers__SendGrid__SandboxMode: "true"
      Providers__Firebase__CredentialFile: /credentials/firebase-default.json
      Templates__FileSystem__BasePath: /app/templates
    volumes:
      - ./templates:/app/templates:ro
      - ./credentials:/credentials:ro
      - ./data/data-protection-keys:/keys
    networks:
      - notification_internal
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

networks:
  notification_internal:
    driver: bridge
  platform_integration:
    external: true
